<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <title>お問い合わせ</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f4f6f9;
            height: 100vh;
            overflow: hidden;
        }

        /* チャットログの基本設定 */
        #chat-log {
            height: 450px;
            /* デフォルト（PC）の高さ */
            overflow-y: auto;
            background: white;
            padding: 20px;
            border: 1px solid #dee2e6;
        }

        /* --- スマホ向けのレスポンシブ設定 --- */
        @media (max-width: 767px) {
            .container {
                padding: 0 !important;
                max-width: 100%;
            }

            #chat-log {
                /* 画面の高さ(100vh)から、ヘッダーとフォーム分(約160px)を引く */
                height: calc(100vh - 160px);
                border-radius: 0;
                border-left: none;
                border-right: none;
            }

            .chat-header {
                border-radius: 0 !important;
            }

            .input-group {
                border-radius: 0 !important;
            }
        }

        /* メッセージのスタイル*/
        .bot-message {
            background-color: #f1f3f5;
            padding: 10px;
            border-radius: 0 15px 15px 15px;
            margin-bottom: 10px;
            max-width: 80%;
        }

        .user-message {
            background-color: #7ec9ff;
            color: #333;
            padding: 10px;
            border-radius: 15px 15px 0 15px;
            margin-bottom: 10px;
            margin-left: auto;
            max-width: 80%;
        }
    </style>
</head>

<body>

    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-12">
                <div class="chat-header bg-primary text-white p-3 rounded-top text-center">
                    チャットでお問い合わせ
                </div>

                <div id="chat-log" class="d-flex flex-column">
                    <div class="bot-message">
                        お問い合わせありがとうございます。<br>
                        AIチャットサポートです。<br>
                        <br>
                        以下のご質問についてお調べいただけます。<br>
                        ・配送料について<br>
                        ・お届け日の指定、変更<br>
                        ・営業時間<br>
                        ・請求書、領収書の発行<br>
                        ・キャンセルについて<br>
                        <br>
                        質問内容をご入力ください。
                    </div>
                </div>

                <form id="chat-form">
                    {% csrf_token %}
                    <div class="input-group p-3 bg-white border-top rounded-bottom">
                        <input type="text" name="input_text" id="user-input" class="form-control"
                            placeholder="メッセージを入力...">
                        <button type="submit" class="btn btn-primary" id="send-btn">送信</button>
                    </div>
                </form>

<script>
    const chatForm = document.getElementById('chat-form');
    const chatLog = document.getElementById('chat-log');
    const userInput = document.getElementById('user-input');

    // 状態管理用
    let isRestoring = false;

    // ページ読み込み時の処理（24時間経過後にデータクリア）
    window.onload = function () {
        const rawData = localStorage.getItem('chatHistory');
        if (!rawData) return;

        const savedData = JSON.parse(rawData);
        const now = new Date().getTime();

        // 24時間（24時間 * 60分 * 60秒 * 1000ミリ秒）経っているかチェック
        if (now - savedData.time > 24 * 60 * 60 * 1000) {
            localStorage.removeItem('chatHistory'); // 古い場合は削除
            return;
        }

        // 24時間以内なら復元する
        isRestoring = true;
        if (savedData.history) {
            savedData.history.forEach(log => {
                appendMessage(log.text, log.role);
            });
        }
        isRestoring = false;
    };

    // 履歴を保存する専用の関数（時刻と一緒に保存する）
    function saveToStorage(historyArray) {
        const data = {
            time: new Date().getTime(), // 保存した時刻
            history: historyArray       // 会話の内容
        };
        localStorage.setItem('chatHistory', JSON.stringify(data));
    }

    // メッセージを表示する関数（LocalStorageに保存する関数）
    function appendMessage(text, sender) {
        // 1. 画面に表示
        const msgDiv = document.createElement('div');
        msgDiv.classList.add(sender === 'user' ? 'user-message' : 'bot-message');
        msgDiv.innerHTML = text;
        chatLog.appendChild(msgDiv);
        chatLog.scrollTop = chatLog.scrollHeight;

        // 2. 保存処理（復元中以外かつ「読み込み中...」以外の時、LocalStorageに保存）
        if (!isRestoring && text !== '読み込み中...') {
            const rawData = localStorage.getItem('chatHistory');
            let currentHistory = [];
            if (rawData) {
                const parsed = JSON.parse(rawData);
                currentHistory = parsed.history || [];
            }
            currentHistory.push({ role: sender, text: text });
            if (currentHistory.length > 20) currentHistory.shift(); // 直近20件のみ
            saveToStorage(currentHistory);
        }
    }

    // フォームの送信イベント
    chatForm.addEventListener('submit', async (e) => {
        e.preventDefault();

        const message = userInput.value;
        if (!message) return;

        // ユーザーのメッセージを表示
        appendMessage(message, 'user');
        userInput.value = '';

        // 「読み込み中」表示
        const loadingMsg = "読み込み中...";
        appendMessage(loadingMsg, 'bot');
        const loadingElements = chatLog.getElementsByClassName('bot-message');
        const lastLoadingDiv = loadingElements[loadingElements.length - 1];

        // データの準備
        const params = new URLSearchParams();
        params.append('input_text', message);
        params.append('csrfmiddlewaretoken', document.querySelector('[name=csrfmiddlewaretoken]').value);
        
        try {
            const response = await fetch("{% url 'bot_response' %}", {
                method: 'POST',
                body: params,
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' }
            });

            if (response.ok) {
                const botText = await response.text();
                // 「読み込み中...」を実際の回答に書き換える
                lastLoadingDiv.innerHTML = botText;
                // 書き換えた後に保存
                saveManual(botText, 'bot');
            } else {
                lastLoadingDiv.innerHTML = "サーバー側でエラーが発生しました。しばらく待ってから再度お試しください。";
            }
        } catch (error) {
            lastLoadingDiv.innerHTML = "通信に失敗しました。";
            console.error("通信失敗:", error);
        }
        
    });

    // AIの回答を後から保存するための補助関数
    function saveManual(text, role) {
        const rawData = localStorage.getItem('chatHistory');
        let currentHistory = [];
        if (rawData) {
            const parsed = JSON.parse(rawData);
            currentHistory = parsed.history || [];
        }
        
        currentHistory.push({ role: role, text: text });
        if (currentHistory.length > 20) currentHistory.shift();
        saveToStorage(currentHistory);
    }
</script>

</body>

</html>
